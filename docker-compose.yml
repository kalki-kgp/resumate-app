services:
  db:
    image: postgres:16-alpine
    container_name: resumate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: resumate
      POSTGRES_PASSWORD: resumate
      POSTGRES_DB: resumate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resumate -d resumate"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resumate-backend
    restart: unless-stopped
    environment:
      PROJECT_NAME: ResuMate API
      VERSION: 0.1.0
      DATABASE_URL: postgresql+psycopg://resumate:resumate@db:5432/resumate
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: resumate-frontend
    restart: unless-stopped
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres_data:
